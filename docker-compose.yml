version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - scriptshelf-network

  # Redis Cache
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - scriptshelf-network

  # Backend API
  server:
    build: ./server
    ports:
      - "5001:5001"
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/scriptshelf
      - REDIS_URL=redis://redis:6379
      - PORT=5001
      - JWT_SECRET=your_jwt_secret_here_change_me
    depends_on:
      - mongodb
      - redis
    networks:
      - scriptshelf-network

  # Frontend Client
  client:
    build: ./client
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5001/api/v1
    depends_on:
      - server
    networks:
      - scriptshelf-network

networks:
  scriptshelf-network:
    driver: bridge

volumes:
  mongo-data:
